name: CI workflow

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main

jobs:
    format:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./src/
        
        strategy:
            matrix:
                node-version: [24.x , 26.x]
        steps:
        - uses: actions/checkout@v3
        - name: Use Node.js ${{ matrix.node-version }}
          uses: actions/setup-node@v3
          with:
            node-version: ${{ matrix.node-version }}
            cache: 'npm'
        - name: Install dependencies
          run: npm ci
        - name: Run formatting check
          run: npm run format
        
    lint:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./src/
        
        strategy:
            matrix:
                node-version: [24.x , 26.x]
        steps:
        - uses: actions/checkout@v3
        - name: Use Node.js ${{ matrix.node-version }}
          uses: actions/setup-node@v3
          with:
            node-version: ${{ matrix.node-version }}
            cache: 'npm'
        - name: Install dependencies
          run: npm ci
        - name: Run linting
          run: npm run lint
        
    test:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./src/
        
        strategy:
            matrix:
                node-version: [24.x , 26.x]
        steps:
        - uses: actions/checkout@v3
        - name: Use Node.js ${{ matrix.node-version }}
          uses: actions/setup-node@v3
          with:
            node-version: ${{ matrix.node-version }}
            cache: 'npm'
        - name: Install dependencies
          run: npm ci
        - name: Run tests
          run: npm test